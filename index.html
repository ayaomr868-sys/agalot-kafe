<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0e8;--dark:#2c1e0a;--brown:#3d2c10;--mid:#5a7a4a;
  --light:#c8d8b0;--gold:#c8a830;--white:#ffffff;--bg:#f5f0e8;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:#2c1e0a;min-height:100vh}

/* ── NAV ── */
.nav{
  position:fixed;top:0;right:0;left:0;z-index:100;
  background:rgba(250,247,240,0.96);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(180,160,120,0.2);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
}
.nav-logo{
  font-family:'Heebo',sans-serif;font-weight:900;font-size:20px;
  color:#2c1e0a;letter-spacing:-0.5px;
}
.nav-logo span{color:#5a7a4a}
.nav-regions{
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
  padding:0 16px;justify-content:center;
}
.nav-regions::-webkit-scrollbar{display:none}
.nav-regions::after{content:'';flex-shrink:0;width:16px}
.regions-bar{
  position:sticky;top:52px;z-index:99;
  background:rgba(250,247,240,0.97);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(180,150,100,0.2);
}
.nav-tab{
  flex-shrink:0;font-family:'Heebo',sans-serif;font-size:13px;font-weight:300;
  padding:6px 12px;border:none;background:transparent;
  color:#666;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all 0.15s;
}
.nav-tab.on{color:#2c1e0a;border-bottom-color:#2c1e0a;font-weight:700}

/* ── HERO ── */
.hero{
  position:relative;margin-top:52px;
  aspect-ratio:2024/777;overflow:hidden;
}
.hero img{width:100%;height:100%;object-fit:cover;object-position:30% center;display:block}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(245,240,232,0.95) 0%,rgba(245,240,232,0.3) 40%,transparent 70%);
}
.hero-search{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  width:90%;max-width:500px;
}
.hero-search input{
  width:100%;padding:14px 48px 14px 18px;
  border-radius:30px;border:none;
  font-family:'Heebo',sans-serif;font-size:14px;font-weight:300;
  background:rgba(255,255,255,0.97);
  box-shadow:0 4px 24px rgba(44,30,10,0.15);
  outline:none;color:#1a2a1a;
}
.hero-search input::placeholder{color:#aaa}
.hero-search .si{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:#aaa;pointer-events:none;font-size:16px;
}

/* ── FILTERS ── */
.filters{
  display:flex;gap:8px;padding:12px 16px;
  overflow-x:auto;scrollbar-width:none;align-items:center;
}
.filters::-webkit-scrollbar{display:none}
.filters::after{content:'';flex-shrink:0;width:8px}
.chip{
  flex-shrink:0;font-family:'Heebo',sans-serif;font-size:12px;font-weight:300;
  padding:6px 14px;border-radius:20px;white-space:nowrap;
  border:1px solid rgba(180,150,100,0.35);background:#faf7f0;color:#5a4a30;
  cursor:pointer;transition:all 0.15s;
}
.chip.on{background:#2c1e0a;color:#f5f0e8;border-color:#2c1e0a}

/* ── NEARBY BAR ── */
.nearby-bar{
  margin:0 16px 8px;padding:12px 16px;
  background:#faf7f0;border-radius:14px;
  border:1px solid rgba(180,150,100,0.2);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 8px rgba(26,58,122,0.06);
}
.nearby-text{font-size:13px;font-weight:700;color:#2c1e0a}
.nearby-sub{font-size:11px;color:#a09070;margin-top:2px;font-weight:300}
.nearby-btn{
  font-family:'Heebo',sans-serif;font-size:12px;font-weight:400;
  padding:7px 16px;border-radius:20px;border:none;
  background:#2c1e0a;color:#f5f0e8;cursor:pointer;white-space:nowrap;
  transition:background 0.15s;
}
.nearby-btn:hover{background:#1e1208}

/* ── NEARBY RESULTS ── */
.nearby-results{
  display:none;padding:0 16px 8px;
  overflow-x:auto;scrollbar-width:none;gap:10px;
}
.nearby-results::-webkit-scrollbar{display:none}
.nearby-results.show{display:flex}
.nearby-card{
  flex-shrink:0;width:150px;background:white;border-radius:14px;
  overflow:hidden;border:1px solid rgba(180,150,100,0.18);
  box-shadow:0 2px 8px rgba(44,30,10,0.07);cursor:pointer;
  transition:transform 0.15s;
}
.nearby-card:active{transform:scale(0.97)}
.nearby-card-img{height:90px;overflow:hidden;position:relative}
.nearby-card-img img{width:100%;height:100%;object-fit:cover;display:block}
.nearby-card-body{padding:8px 10px 10px}
.nearby-card-name{font-size:12px;font-weight:700;color:#2c1e0a;line-height:1.2}
.nearby-card-dist{font-size:10px;color:#5a7a4a;margin-top:3px}

/* ── SECTION LABEL ── */
.section-label{
  font-size:12px;font-weight:300;color:#a09070;
  padding:4px 16px 6px;letter-spacing:0.5px;
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;padding:0 16px;
}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}

/* ── CARD ── */
.cart-card{
  background:white;border-radius:16px;overflow:hidden;cursor:pointer;
  border:1px solid rgba(180,150,100,0.2);
  box-shadow:0 2px 10px rgba(44,30,10,0.07);
  transition:transform 0.18s,box-shadow 0.18s;
  display:flex;flex-direction:column;
}
.cart-card:active{transform:scale(0.97)}
.cart-card:hover{box-shadow:0 6px 20px rgba(44,30,10,0.12);transform:translateY(-2px)}
.card-photo{
  width:100%;aspect-ratio:1/1;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#5a7a4a,#3d2c10);
}
.card-photo img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform 0.4s;
}
.cart-card:hover .card-photo img{transform:scale(1.06)}
.card-photo-fb{
  width:100%;height:100%;display:none;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,#5a7a4a22,#3d2c1022);
}
.card-scrim{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(44,30,10,0.4) 0%,transparent 55%);
}
.featured-banner{
  position:absolute;top:8px;right:8px;
  background:#c8a830;color:#3a2800;
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:8px;z-index:2;
}
.card-body{padding:10px 12px 13px}
.card-name{font-size:14px;font-weight:700;color:#2c1e0a;line-height:1.2;margin-bottom:3px}
.card-loc{font-size:10px;color:#a09070;font-weight:300}
.card-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:6px}
.tag-open{background:#e8f0e0;color:#3a5a28}
.tag-kosher{background:#f5f0d8;color:#7a5410}
.tag-featured{background:#fdf0c0;color:#7a5000;border:1px solid #c8a830;font-weight:700}
.open-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#5a7a4a;margin-left:4px;vertical-align:middle;
}

/* ── CARD DETAIL (expand) ── */
.card-detail{
  background:white;border:1px solid rgba(180,150,100,0.2);
  border-top:none;border-radius:0 0 16px 16px;
  padding:14px 16px 16px;margin-top:-10px;padding-top:20px;
  box-shadow:0 4px 16px rgba(44,30,10,0.1);
  animation:slideIn 0.2s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.card-expanded{border-radius:16px 16px 0 0!important;border-bottom-color:transparent!important}
.mbadges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mbadge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;padding:3px 10px;border-radius:8px;
}
.mbadge-shabbat{background:#e8f0e0;color:#3a5a28;border:1px solid #b8d0a0}
.mbadge-kosher{background:#f5f0d8;color:#7a5410;border:1px solid #e0c880}
.mbadge-parking{background:#ece8f0;color:#3a3060;border:1px solid #c0b8d8}
.mbadge-playground{background:#e8f0e0;color:#3a5a28;border:1px solid #b8d0a0}
.divider{height:1px;background:rgba(180,150,100,0.2);margin:10px 0}
.irow{display:flex;align-items:flex-start;gap:8px;padding:3px 0}
.irow .ico{flex-shrink:0;font-size:13px}
.irow span{font-size:12px;font-weight:300;color:#333;line-height:1.6}
.mhead{font-size:12px;font-weight:700;color:#1a2a1a;margin:10px 0 6px;letter-spacing:1px}
.mpills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.mpill{font-size:11px;padding:3px 10px;border-radius:8px;background:#f5f0e8;color:#3a2c18;border:1px solid rgba(180,150,100,0.2)}
.mbtns{display:flex;gap:8px;margin-top:12px}
.mbtns button{
  flex:1;font-family:'Heebo',sans-serif;font-size:13px;font-weight:400;
  padding:10px;border-radius:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all 0.15s;
}
.btn-nav{background:#2c1e0a;color:#f5f0e8;border:none}
.btn-nav:hover{background:#1e1208}
.btn-share{background:white;color:#333;border:1px solid #ddd}

/* ── EMPTY ── */
.empty{
  text-align:center;padding:48px 16px;
  font-size:14px;color:#a09070;grid-column:1/-1;font-weight:300;
}

/* ── MAP ── */
.map-wrap{padding:0 16px;margin-top:10px;display:none}
.map-wrap.show{display:block}
#mapContainer{
  width:100%;height:400px;border-radius:16px;overflow:hidden;
  border:1px solid rgba(18,160,110,0.2);
  box-shadow:0 2px 12px rgba(26,58,122,0.09);
}

/* ── ADD CART BUTTON ── */
.add-btn{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:'Heebo',sans-serif;font-size:14px;font-weight:400;
  padding:12px 28px;border-radius:30px;border:none;
  background:#2c1e0a;color:#f5f0e8;cursor:pointer;
  box-shadow:0 4px 20px rgba(44,30,10,0.35);z-index:99;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
}

/* ── ADD FORM OVERLAY ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(10,20,10,0.5);backdrop-filter:blur(4px);
  align-items:flex-end;justify-content:center;
}
.overlay.show{display:flex}
.form-sheet{
  background:white;border-radius:24px 24px 0 0;
  width:100%;max-width:480px;padding:24px 20px 40px;
  max-height:85vh;overflow-y:auto;
}
.form-title{font-size:20px;font-weight:900;color:#2c1e0a;margin-bottom:18px}
.form-field{
  width:100%;padding:11px 14px;border-radius:12px;
  border:1px solid rgba(180,150,100,0.3);
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:300;
  color:#1a2a1a;outline:none;margin-bottom:10px;
}
.form-field:focus{border-color:#2c1e0a}
.form-checks{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.form-checks label{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:300;cursor:pointer;
}
.form-submit{
  width:100%;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;
  padding:13px;border-radius:24px;border:none;
  background:#2c1e0a;color:#f5f0e8;cursor:pointer;
}
.form-thanks{
  display:none;text-align:center;font-size:14px;
  color:#5a7a4a;padding:10px 0;font-weight:300;
}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:28px 16px 80px;
  font-size:11px;color:#b0a080;font-weight:300;letter-spacing:1px;
}
</style>
</head>

  {id:83,name:"חוות החוויות",region:"דרום",city:"כפר הנגיד",hours:"א׳–ה׳ 09:00–13:00, ו׳ 09:00–13:00, ש׳ 09:00–16:00+19:00",shabbat:true,parking:true,kosher:false,desc:"חוות ילדים עם עגלת קפה מפנקת למבוגרים. בעלי חיים, שקט פנימי, סדנאות, שבתות משפחתיות. @havat_hachavayot. טל׳: 055-3611652.",menu:["קפה","מאפים","שתייה"],phone:"055-3611652",playground:true,lat:31.8,lng:34.73,insta:"havat_hachavayot",featured:false},
];

const REGION_COLOR = {
  'צפון':'#3a6a40','שרון':'#7a5a20','מרכז':'#3a507a',
  'שפלה':'#6a4a2a','ירושלים':'#8a4a00','דרום':'#2a6a6a'
};

let aF='all', aR='all', openId=null, mapInit=false, mapShown=false;

function photo(id){ return PHOTO_POOL[id % PHOTO_POOL.length] }

function imgEl(id, sq){
  const url = photo(id);
  return `<img src="${url}" alt="" loading="lazy"
    style="width:100%;height:100%;object-fit:cover;display:block"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
  <div class="card-photo-fb" style="display:none">☕</div>`;
}

// NAV regions
function buildNav(){
  const regs = ['all',...new Set(CARTS.map(c=>c.region))];
  document.getElementById('navRegions').innerHTML = regs.map(r=>
    `<button class="nav-tab${r===aR?' on':''}" onclick="setR('${r}')">${r==='all'?'כל הארץ':r}</button>`
  ).join('');
}

function setR(r){ aR=r; buildNav(); closeDetail(); render(); }
function setF(btn,f){
  aF=f;
  document.querySelectorAll('.chip[data-f]').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  closeDetail(); render();
}

function filtered(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  return CARTS.filter(c=>{
    const mq=!q||c.name.includes(q)||c.city.includes(q)||c.region.includes(q);
    const mr=aR==='all'||c.region===aR;
    const mf=aF==='all'
      ||(aF==='shabbat'&&c.shabbat)
      ||(aF==='parking'&&c.parking)
      ||(aF==='kosher'&&c.kosher)
      ||(aF==='playground'&&c.playground)
      ||(aF==='featured'&&c.featured);
    return mq&&mr&&mf;
  }).sort((a,b)=>(b.featured||false)-(a.featured||false));
}

function render(){
  const list = filtered();
  document.getElementById('rlabel').textContent = `${list.length} עגלות`;
  if(!list.length){
    document.getElementById('grid').innerHTML='<div class="empty">לא נמצאו עגלות קפה...</div>';
    return;
  }
  document.getElementById('grid').innerHTML = list.map(c=>`
    <div class="cart-card${openId===c.id?' card-expanded':''}" id="cart-card-${c.id}" onclick="openDetail(${c.id})">
      <div class="card-photo">
        ${imgEl(c.id)}
        <div class="card-scrim"></div>
        ${c.featured?'<div class="featured-banner">★ מומלץ</div>':''}
      </div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-loc">${c.city}</div>
        <div class="card-tags">
          ${c.featured?'<span class="tag tag-featured">★ מומלץ</span>':''}
          ${c.shabbat?'<span class="tag tag-open">☀ שבת</span>':''}
          ${c.kosher?'<span class="tag tag-kosher">כשר</span>':''}
        </div>
      </div>
    </div>`).join('');
  if(openId) openDetail(openId);
}

function openDetail(id){
  if(openId&&openId!==id){ closeDetail(); }
  if(openId===id){ closeDetail(); return; }
  openId=id;
  const c=CARTS.find(x=>x.id===id);
  if(!c)return;
  const card=document.getElementById('cart-card-'+id);
  if(!card)return;
  card.classList.add('card-expanded');
  const det=document.createElement('div');
  det.id='card-detail-'+id;
  det.className='card-detail';
  const phoneLine=c.phone?`<div class="irow"><span class="ico">📞</span><span><a href="tel:${c.phone}" style="color:inherit">${c.phone}</a></span></div>`:'';
  det.innerHTML=`
    <div class="mbadges">
      ${c.shabbat?'<span class="mbadge mbadge-shabbat">☀ פתוח בשבת</span>':''}
      ${c.kosher?'<span class="mbadge mbadge-kosher">✡ כשר</span>':''}
      ${c.parking?'<span class="mbadge mbadge-parking">🚗 חניה</span>':''}
      ${c.playground?'<span class="mbadge mbadge-playground">🛝 גן שעשועים</span>':''}
    </div>
    <div class="irow"><span class="ico">📍</span><span>${c.city} · ${c.region}</span></div>
    <div class="irow"><span class="ico">🕐</span><span>${c.hours}</span></div>
    <div class="divider"></div>
    <div class="irow"><span class="ico">💬</span><span>${c.desc}</span></div>
    ${phoneLine}
    <div class="mhead">תפריט</div>
    <div class="mpills">${c.menu.map(x=>`<span class="mpill">${x}</span>`).join('')}</div>
    <div class="mbtns">
      <button class="btn-nav" onclick="waze(event,'${c.name.replace(/'/g,String.fromCharCode(39))}')">🧭 נווט בוויז</button>
      <button class="btn-share" onclick="share('${c.name.replace(/'/g,String.fromCharCode(39))}','${c.city.replace(/'/g,String.fromCharCode(39))}')">שתף</button>
    </div>
    ${c.insta?`<div style="margin-top:8px"><a href="https://instagram.com/${c.insta}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#5a4a30;text-decoration:none;padding:6px 12px;background:#f5f0e4;border-radius:10px">📸 אינסטגרם</a></div>`:''}
    ${!c.phone&&!c.insta?'<div style="font-size:11px;color:#aaa;margin-top:8px">אין פרטי יצירת קשר</div>':''}`;
  card.after(det);
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDetail(){
  if(openId){
    const det=document.getElementById('card-detail-'+openId);
    if(det)det.remove();
    const card=document.getElementById('cart-card-'+openId);
    if(card)card.classList.remove('card-expanded');
  }
  openId=null;
}

function waze(e,n){ e.stopPropagation(); window.open(`https://waze.com/ul?q=${encodeURIComponent(n)}&navigate=yes`,'_blank'); }
function share(n,c){
  if(navigator.share) navigator.share({title:n,text:`${n} — עגלת קפה ב${c}`,url:location.href});
  else{ navigator.clipboard?.writeText(`${n} — עגלת קפה ב${c}`); alert('הועתק!'); }
}

// ── NEARBY ──
function findNearby(){
  const sub = document.getElementById('nearbySubText');
  sub.textContent = 'מאתר מיקום...';
  if(!navigator.geolocation){ sub.textContent='הדפדפן לא תומך במיקום'; return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    const withDist = CARTS
      .filter(c=>c.lat&&c.lng)
      .map(c=>{
        const d = Math.sqrt(Math.pow((c.lat-lat)*111,2)+Math.pow((c.lng-lng)*85,2));
        return {...c, dist:d};
      })
      .sort((a,b)=>a.dist-b.dist)
      .slice(0,6);
    const res = document.getElementById('nearbyResults');
    if(!withDist.length){ sub.textContent='לא נמצאו עגלות עם נתוני מיקום בקרבתך'; return; }
    res.innerHTML = withDist.map(c=>{
      const km = c.dist < 1 ? Math.round(c.dist*1000)+'מ׳' : c.dist.toFixed(1)+'ק״מ';
      return `<div class="nearby-card" onclick="openDetail(${c.id});document.getElementById('cart-card-${c.id}').scrollIntoView({behavior:'smooth'})">
        <div class="nearby-card-img">${imgEl(c.id)}</div>
        <div class="nearby-card-body">
          <div class="nearby-card-name">${c.name}</div>
          <div class="nearby-card-dist">📍 ${km} ממך</div>
        </div>
      </div>`;
    }).join('');
    res.classList.add('show');
    sub.textContent = `${withDist.length} עגלות קרובות אליך`;
  }, err=>{
    sub.textContent = 'לא ניתן לקבל מיקום';
  });
}

// ── MAP ──
function toggleMap(){
  mapShown = !mapShown;
  const wrap = document.getElementById('mapWrap');
  const btn = document.getElementById('mapBtn');
  if(mapShown){
    wrap.classList.add('show');
    btn.textContent = '✕ סגור מפה';
    if(!mapInit) initMap();
  } else {
    wrap.classList.remove('show');
    btn.textContent = '📍 מפה';
  }
}

function initMap(){
  mapInit = true;
  const container = document.getElementById('mapContainer');
  const carts = CARTS.filter(c=>c.lat&&c.lng);
  
  // Build markers list for a simple SVG map fallback
  // Use Google Maps static embed via iframe (works offline too with cached tiles)
  // Instead: build a visual card list with nav buttons
  
  container.style.background = '#f5f0e8';
  container.style.overflowY = 'auto';
  container.style.padding = '12px';
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.style.gap = '8px';
  
  const filtered = CARTS.filter(c=>c.lat&&c.lng);
  
  if(!filtered.length){
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;font-size:13px">אין עגלות עם נתוני מיקום</div>';
    return;
  }
  
  container.innerHTML = `
    <div style="font-size:12px;color:#a09070;margin-bottom:4px;font-weight:300">
      ${filtered.length} עגלות עם מיקום — לחץ על עגלה לניווט
    </div>
    ${filtered.map(c=>`
      <div style="
        background:white;border-radius:12px;padding:10px 14px;
        border:1px solid rgba(180,150,100,0.2);
        display:flex;align-items:center;justify-content:space-between;gap:10px;
        cursor:pointer;
      " onclick="window.open('https://waze.com/ul?ll=${c.lat},${c.lng}&navigate=yes','_blank')">
        <div>
          <div style="font-size:13px;font-weight:700;color:#2c1e0a">${c.name}</div>
          <div style="font-size:11px;color:#888;margin-top:2px">${c.city} · ${c.region}</div>
          ${c.shabbat?'<span style="font-size:10px;color:#3a5a28;background:#e8f0e0;padding:1px 6px;border-radius:5px;margin-top:4px;display:inline-block">☀ שבת</span>':''}
        </div>
        <div style="
          background:#2c1e0a;color:#f5f0e8;
          font-size:11px;padding:6px 12px;border-radius:10px;
          white-space:nowrap;flex-shrink:0;
        ">🧭 נווט</div>
      </div>
    `).join('')}
  `;
}
// ── FORM ──
function openForm(){ document.getElementById('formOverlay').classList.add('show'); document.body.style.overflow='hidden'; }
function closeForm(){ document.getElementById('formOverlay').classList.remove('show'); document.body.style.overflow=''; }
function submitForm(){
  const name=document.getElementById('af_name').value.trim();
  const city=document.getElementById('af_city').value.trim();
  const region=document.getElementById('af_region').value;
  if(!name||!city||!region){ alert('נא למלא שם, עיר ואזור'); return; }
  const body=['שם: '+name,'עיר: '+city,'אזור: '+region,
    'שעות: '+(document.getElementById('af_hours').value||'לא צוין'),
    'אינסטגרם: '+(document.getElementById('af_insta').value||'—'),
    'תיאור: '+(document.getElementById('af_desc').value||'—'),
    'שבת: '+(document.getElementById('af_shabbat').checked?'כן':'לא'),
    'כשר: '+(document.getElementById('af_kosher').checked?'כן':'לא'),
    'גן שעשועים: '+(document.getElementById('af_playground').checked?'כן':'לא'),
  ].join('\n');
  window.open('mailto:info.haagala@gmail.com?subject=עגלה חדשה: '+encodeURIComponent(name)+'&body='+encodeURIComponent(body));
  document.getElementById('af_thanks').style.display='block';
}

buildNav();
render();
</script>
